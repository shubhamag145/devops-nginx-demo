<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Josh Batch 10</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      max-width: 500px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #ffd369;
    }

    h2 {
      font-weight: 300;
      margin-bottom: 20px;
    }

    .boom {
      font-size: 2rem;
      font-weight: bold;
      color: #ff4d6d;
      margin: 20px 0;
      animation: pop 1s infinite alternate;
    }

    @keyframes pop {
      from { transform: scale(1); }
      to { transform: scale(1.2); }
    }

    .feature-box {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .feature-box p {
      margin: 5px 0;
    }

    .key {
      margin-top: 15px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 25px;
      background: #ffd369;
      color: black;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffb703;
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>👋 Hello Dosto</h1>
    <h2>Aapka Swagat hai <b>Josh Batch 10</b> me 🚀</h2>

    <div class="boom">💥 BOOM!</div>

    <div class="feature-box">
      <h3>✨ Features</h3>
      <p>✔ This is a feature</p>
      <p>✔ Good feature</p>
    </div>

    <div class="key">
      🔐 AWS Connector Key: <b>123</b>
    </div>

    <a href="#" class="btn">Get Started</a>
  </div>

</body>
</html>
